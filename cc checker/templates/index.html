    <script title="ajax do checker">
      function enviar() {
    var linha = $("#lista").val();
    var linhaenviar = linha.split("\n");

    // If only one card is entered, treat it as a single card
    if (linhaenviar.length === 1) {
        checkSingleCard(linhaenviar[0]);
    } else {
        linhaenviar.forEach(function(value, index) {
            setTimeout(function() {
                checkSingleCard(value);
            }, 2000 * index);
        });
    }
}

function checkSingleCard(card) {
    var e = document.getElementById("gate");
    var gate = e.options[e.selectedIndex].value;
    
    $.ajax({
        type: "POST",
        url: "/check_cards", // Your Flask route to handle both single and mass card checking
        data: { card_data: card },
        success: function(resultado) {
            // Handle the response from Flask if needed
        }
    });
}

        function aprovadas(str) {

        function edrovadas(str) {

        function removelinha() {
            var lines = $("#lista").val().split('\n');
            lines.splice(0, 1);
            $("#lista").val(lines.join("\n"));
        }
        function copyToClipboard(element) {
      var $temp = $("<input>");
      $("body").append($temp);
      $temp.val($(element).text()).select();
      document.execCommand("copy");
      $temp.remove();
    }
    
    function selectText(containerid) {
                                if (document.selection) {
                                    var range = document.body.createTextRange();
                                    range.moveToElementText(document.getElementById(containerid));
                                    range.select();
                                } else if (window.getSelection()) {
                                    var range = document.createRange();
                                    range.selectNode(document.getElementById(containerid));
                                    window.getSelection().removeAllRanges();
                                    window.getSelection().addRange(range);
                                }
                            }
                            
    </script>
